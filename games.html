<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Game — Lyfe.fy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0e0e0c;--ink2:#2a2a26;--ink3:#5a5a52;--cream:#f5f2eb;--cream2:#ede9df;--cream3:#e2ddd2;--green:#1a7a52;--gl:#d4ede2;--gm:#2a9e6a;--amber:#c8821a;--al:#faeeda;--w:#fff;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--rsm:8px;--rlg:20px;--rxl:28px;--ease:cubic-bezier(.25,.46,.45,.94)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream2);color:var(--ink);font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}
input,select{font-family:var(--sans)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--sans);font-size:12px;font-weight:500;padding:8px 16px;border-radius:var(--rsm);border:1px solid transparent;cursor:pointer;transition:all .2s;text-decoration:none}
.bi{background:var(--ink);color:var(--cream);border-color:var(--ink)}.bi:hover{background:var(--ink2);transform:translateY(-1px)}
.bg{background:var(--gm);color:#fff;border-color:var(--gm)}.bg:hover{background:var(--green);transform:translateY(-1px)}
.bo{background:transparent;color:var(--ink2);border-color:var(--cream3)}.bo:hover{background:var(--cream2)}
.bfw{width:100%;justify-content:center}
.bsm{font-size:11px;padding:5px 11px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:64px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(237,233,223,.97);border-bottom:1px solid rgba(90,90,82,.12);backdrop-filter:blur(8px)}
.logo{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink)}
.logo span{color:var(--gm)}
.nav-links{display:flex;align-items:center;gap:24px;list-style:none}
.nav-links a{font-size:13px;color:var(--ink3);transition:color .2s}
.nav-links a:hover{color:var(--ink)}
.nav-act{display:flex;gap:10px;align-items:center}
.uav-mini{width:32px;height:32px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;cursor:pointer}

/* PAGE HEAD */
.pagehead{max-width:1180px;margin:0 auto;padding:36px 32px 0}
.ph-eyebrow{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.ph-title{font-family:var(--serif);font-size:clamp(28px,4vw,40px);font-weight:900;letter-spacing:-.02em;margin-bottom:6px}
.ph-title em{font-style:italic;color:var(--green)}
.ph-sub{font-size:14px;color:var(--ink3);font-weight:300}

/* FAIRWAY MATCH BANNER */
.fm-banner{background:linear-gradient(135deg,#0e3d28 0%,#1a5c3a 100%);border-radius:var(--rlg);padding:22px 26px;color:var(--cream);display:flex;align-items:center;gap:18px;margin:20px 0}
.fm-b-icon{font-size:26px;flex-shrink:0}
.fm-b-eyebrow{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#6ecfa0;margin-bottom:4px}
.fm-b-title{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--cream);margin-bottom:2px}
.fm-b-sub{font-size:12.5px;color:rgba(245,242,235,.5)}
.fm-b-score{font-family:var(--serif);font-size:26px;font-weight:900;color:#a8dfc4;flex-shrink:0;text-align:center}
.fm-b-score-lbl{font-size:9px;color:rgba(245,242,235,.4);text-transform:uppercase;letter-spacing:.08em}

/* FILTERS */
.filters{max-width:1180px;margin:0 auto;padding:0 32px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.search-inp{flex:1;min-width:220px;max-width:320px;padding:9px 14px;border:1px solid var(--cream3);border-radius:var(--rsm);background:var(--w);font-size:13px;outline:none}
.search-inp:focus{border-color:var(--green)}
.chip{font-size:11.5px;font-weight:500;padding:7px 15px;border-radius:30px;border:1px solid var(--cream3);background:var(--w);color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--ink3)}
.chip.sel{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* GRID */
.grid{max-width:1180px;margin:0 auto;padding:0 32px 80px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.loading{display:flex;align-items:center;gap:10px;justify-content:center;padding:60px;color:var(--ink3);font-size:13px;grid-column:1/-1}
.spinner{width:18px;height:18px;border:2px solid var(--cream3);border-top-color:var(--gm);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--ink3)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.5}

/* SESSION CARD */
.scard{background:var(--w);border:1px solid var(--cream3);border-radius:var(--rlg);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.scard:hover{box-shadow:0 8px 28px rgba(14,14,12,.08);transform:translateY(-2px)}
.sc-top{padding:18px 18px 14px}
.sc-match{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--green);background:var(--gl);border:1px solid rgba(42,158,106,.2);padding:3px 10px;border-radius:20px;margin-bottom:10px}
.sc-title{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.25}
.sc-host{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sc-host-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;color:#fff;flex-shrink:0}
.sc-host-name{font-size:12px;color:var(--ink2)}
.sc-meta{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--ink3)}
.sc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.sc-tag{font-size:10px;font-weight:500;padding:2px 9px;border-radius:14px;background:var(--cream2);color:var(--ink3)}
.sc-foot{border-top:1px solid var(--cream3);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--cream2)}
.sc-price{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink)}
.sc-spots{font-size:10.5px;color:var(--ink3)}
.sc-spots.low{color:var(--amber);font-weight:600}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="logo">Lyfe<span>.</span>fy</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
  </ul>
  <div class="nav-act" id="nav-act">
    <a href="onboarding.html" class="btn bi" id="nav-join-btn">Join Lyfe.fy</a>
  </div>
</nav>

<div class="pagehead">
  <div class="ph-eyebrow">Find a Round</div>
  <h1 class="ph-title">Your next <em>round</em> starts here</h1>
  <p class="ph-sub">Browse hosted golf sessions, see who's a great fit, and book your tee time in seconds.</p>

  <!-- FAIRWAY MATCH BANNER — shown only when signed in -->
  <div class="fm-banner" id="fm-banner" style="display:none"></div>
</div>

<div class="filters">
  <input class="search-inp" id="search" type="text" placeholder="Search title, location, host..." oninput="renderSessions()">
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div>Loading sessions...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lyfe-core.js"></script>
<script>
let U = null, P = null;
let allSessions = [];
let hostProfiles = {};
let myWeeklyMatch = null;

function $(id){return document.getElementById(id);}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function avColor(seed){
  const colors=['#2a9e6a','#7c5fa0','#c8821a','#3a7ca5','#c0526a'];
  let h=0; for(let i=0;i<(seed||'').length;i++) h=(h+seed.charCodeAt(i))%colors.length;
  return colors[h];
}
function initials(name){return (name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();}
function formatTime(t){if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return(hr%12||12)+':'+m+(hr>=12?'pm':'am');}
function fmtDate(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):'TBD';}

/* ════ MATCHING ENGINE (shared logic with dashboard.html) ════ */
function computeMatchScore(me, them) {
  let score = 0;
  const sharedTags = [];
  if (!me || !them) return { score: 0, sharedTags: [] };

  const sameCity = me.city && them.city && me.city === them.city;
  if (!sameCity && !(me.willing_to_travel || them.willing_to_travel)) return { score: 0, sharedTags: [] };
  if (sameCity) { score += 10; sharedTags.push(me.city); }

  const skillOrder = ['Beginner','Intermediate','Advanced','Competitive'];
  const mySkillIdx = skillOrder.indexOf(me.skill_level);
  const theirSkillIdx = skillOrder.indexOf(them.skill_level);
  if (mySkillIdx >= 0 && theirSkillIdx >= 0) {
    const diff = Math.abs(mySkillIdx - theirSkillIdx);
    score += diff === 0 ? 25 : diff === 1 ? 15 : 5;
    if (diff <= 1) sharedTags.push(them.skill_level + ' level');
  }

  const mySchedule = Array.isArray(me.schedule) ? me.schedule : [];
  const theirSchedule = Array.isArray(them.schedule) ? them.schedule : [];
  const scheduleOverlap = mySchedule.filter(s => theirSchedule.includes(s));
  if (scheduleOverlap.length > 0) { score += Math.min(20, scheduleOverlap.length * 10); sharedTags.push(scheduleOverlap[0]); }

  const myEnergy = Array.isArray(me.energy) ? me.energy : [];
  const theirEnergy = Array.isArray(them.energy) ? them.energy : [];
  const energyOverlap = myEnergy.filter(e => theirEnergy.includes(e));
  if (energyOverlap.length > 0) { score += Math.min(20, energyOverlap.length * 10); sharedTags.push(energyOverlap[0]); }

  if (me.industry && them.industry && me.industry === them.industry) { score += 15; sharedTags.push(them.industry); }
  if (me.golf_style && them.golf_style && me.golf_style === them.golf_style) { score += 10; sharedTags.push(them.golf_style); }

  return { score: Math.min(100, score), sharedTags: sharedTags.slice(0,4) };
}

function isoWeekMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(date.setDate(diff)).toISOString().split('T')[0];
}

async function loadFairwayMatchBanner() {
  if (!U || !P) return;
  const weekOf = isoWeekMonday(new Date());
  const { data: existing } = await db.from('weekly_matches').select('*').eq('user_id', U.id).eq('week_of', weekOf).maybeSingle();

  let match = existing;
  if (!match) {
    const { data: candidates } = await db.from('profiles').select('*').neq('id', U.id).not('role','in','(host_training)');
    let best = null;
    (candidates || []).forEach(c => {
      const { score, sharedTags } = computeMatchScore(P, c);
      if (score > 0 && (!best || score > best.score)) best = { matched_user_id: c.id, score, sharedTags, profile: c };
    });
    if (best) {
      const { data: inserted } = await db.from('weekly_matches').insert({
        user_id: U.id, matched_user_id: best.matched_user_id, score: best.score,
        shared_tags: best.sharedTags, week_of: weekOf, status: 'suggested'
      }).select().single();
      match = inserted || { ...best, week_of: weekOf, status: 'suggested' };
    }
  }
  if (!match) return;

  let profile = match.profile;
  if (!profile) {
    const { data } = await db.from('profiles').select('*').eq('id', match.matched_user_id).maybeSingle();
    profile = data;
  }
  myWeeklyMatch = { ...match, profile };

  const banner = $('fm-banner');
  banner.style.display = 'flex';
  banner.innerHTML = `
    <div class="fm-b-icon">⛳</div>
    <div style="flex:1">
      <div class="fm-b-eyebrow">Fairway Match</div>
      <div class="fm-b-title">${profile?.full_name || 'A fellow golfer'} could be your next great round</div>
      <div class="fm-b-sub">${(Array.isArray(match.shared_tags)?match.shared_tags:[]).slice(0,3).join(' · ') || 'Compatible schedule and skill level'}</div>
    </div>
    <div class="fm-b-score">${match.score}%<div class="fm-b-score-lbl">Match</div></div>
    <a href="dashboard.html" class="btn bo" style="background:rgba(255,255,255,.08);color:var(--cream);border-color:rgba(255,255,255,.18);flex-shrink:0">View in Dashboard →</a>
  `;
}

/* ════ SESSIONS ════ */
async function loadSessions() {
  // Golf-only platform — hard filter at the query level
  const { data: sessions } = await db.from('sessions').select('*').eq('status','active').eq('sport','Golf').order('session_date',{ascending:true});
  allSessions = sessions || [];

  // Fetch host profiles in bulk for match scoring + avatar display
  const hostIds = [...new Set(allSessions.map(s => s.host_id).filter(Boolean))];
  if (hostIds.length) {
    const { data: hosts } = await db.from('profiles').select('*').in('id', hostIds);
    (hosts || []).forEach(h => { hostProfiles[h.id] = h; });
  }
  renderSessions();
}

function renderSessions() {
  const q = ($('search').value || '').toLowerCase();
  let data = allSessions;
  if (q) data = data.filter(s =>
    (s.title||'').toLowerCase().includes(q) ||
    (s.location||'').toLowerCase().includes(q) ||
    (hostProfiles[s.host_id]?.full_name||'').toLowerCase().includes(q)
  );

  const grid = $('grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⛳</div><div style="font-weight:500">No sessions found</div><div style="font-size:12px;margin-top:4px">Try a different sport or search term.</div></div>';
    return;
  }

  grid.innerHTML = data.map(s => {
    const host = hostProfiles[s.host_id] || {};
    const hostName = host.full_name || 'Lyfe.fy Host';
    const booked = s.spots_taken || 0;
    const total = s.spots_total || 8;
    const left = total - booked;
    const lowSpots = left > 0 && left <= 2;
    const price = parseFloat(s.price) === 0 ? 'Free' : '$' + parseFloat(s.price).toFixed(0);
    const emoji = '⛳';

    // Compatibility with host — only meaningful if viewer is signed in
    let matchBadge = '';
    if (P && host.id) {
      const { score } = computeMatchScore(P, host);
      if (score > 0) matchBadge = `<div class="sc-match">✨ ${score}% match with host</div>`;
    }

    return `<div class="scard">
      <div class="sc-top">
        ${matchBadge}
        <div class="sc-title">${emoji} ${s.title || 'Session'}</div>
        <div class="sc-host">
          <div class="sc-host-av" style="background:${avColor(host.id||hostName)}">${initials(hostName)}</div>
          <div class="sc-host-name">${hostName}</div>
        </div>
        <div class="sc-meta">
          <div>📅 ${fmtDate(s.session_date)}${s.session_time?' · '+formatTime(s.session_time):''}</div>
          <div>📍 ${s.location || 'Location TBD'}</div>
          <div>${cap(s.skill_level||'All levels')} · ${cap(s.format||'')}</div>
        </div>
        <div class="sc-tags">
          <span class="sc-tag">${cap(s.session_type||'Casual')}</span>
        </div>
      </div>
      <div class="sc-foot">
        <div>
          <div class="sc-price">${price}</div>
          <div class="sc-spots ${lowSpots?'low':''}">${left>0 ? left+' spot'+(left!==1?'s':'')+' left' : 'Full'}</div>
        </div>
        ${U
          ? (left>0 ? `<button class="btn bg bsm" onclick="bookSession('${s.id}')">Book Now</button>` : `<span style="font-size:11px;color:var(--ink3)">Full</span>`)
          : `<a href="onboarding.html" class="btn bi bsm">Sign up to book</a>`
        }
      </div>
    </div>`;
  }).join('');
}

async function bookSession(sessionId) {
  const s = allSessions.find(x => x.id === sessionId);
  if (!s) return;
  if (!confirm('Book "' + s.title + '" for ' + (parseFloat(s.price)===0?'free':'$'+parseFloat(s.price).toFixed(0)) + '?')) return;

  const { error } = await db.from('bookings').insert({
    session_id: sessionId, player_id: U.id, paid_amount: parseFloat(s.price)||0, status: 'confirmed'
  });
  if (error) { alert('Booking failed: ' + error.message); return; }

  await db.from('sessions').update({ spots_taken: (s.spots_taken||0) + 1 }).eq('id', sessionId);
  alert('✓ Booked! Check your dashboard for details.');
  window.location.href = 'dashboard.html';
}

/* ════ AUTH (optional — page browsable as guest) ════ */
(async function boot() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    U = session.user;
    const { data: profile } = await db.from('profiles').select('*').eq('id', U.id).maybeSingle();
    P = profile;
    const navAct = $('nav-act');
    const name = P?.full_name || U.email?.split('@')[0] || 'Player';
    navAct.innerHTML = `<a href="dashboard.html" class="uav-mini" title="${name}">${initials(name)}</a>`;
    await loadFairwayMatchBanner();
  }
  await loadSessions();
})();
</script>
</body>
</html>
