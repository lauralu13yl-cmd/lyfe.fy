<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed — Lyfe.fy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0e0e0c;--ink3:#5a5a52;--cream:#f5f2eb;--cream2:#ede9df;--cream3:#e2ddd2;--green:#1a7a52;--gl:#d4ede2;--gm:#2a9e6a;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--rlg:20px;--ease:cubic-bezier(.25,.46,.45,.94)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream2);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--cream3);border-radius:var(--rlg);padding:48px 40px;max-width:440px;width:100%;text-align:center}
.check{width:56px;height:56px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:var(--green)}
h1{font-family:var(--serif);font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em}
p{font-size:14px;color:var(--ink3);line-height:1.6;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:var(--sans);font-size:13px;font-weight:500;padding:11px 22px;border-radius:8px;border:1px solid var(--ink);background:var(--ink);color:var(--cream);text-decoration:none;transition:all .2s var(--ease)}
.btn:hover{background:#2a2a26;transform:translateY(-1px)}
.note{font-size:12px;color:var(--ink3);margin-top:16px}
</style>
</head>
<body>
<div class="card">
<div class="check">✓</div>
<h1>You're booked!</h1>
<p>Your payment went through and your spot is confirmed. Check your dashboard for session details, or look out for a confirmation email.</p>
<a href="dashboard.html" class="btn">Go to dashboard →</a>
<p class="note">Trouble with your booking? Contact support and have your session name ready.</p>
</div>
</body>
</html>
