<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Academy — Lyfe.fy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0e0e0c;--ink2:#2a2a26;--ink3:#5a5a52;--cream:#f5f2eb;--cream2:#ede9df;--cream3:#e2ddd2;--green:#1a7a52;--gl:#d4ede2;--gm:#2a9e6a;--amber:#c8821a;--al:#faeeda;--w:#fff;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;--rsm:8px;--rlg:20px;--rxl:28px;--ease:cubic-bezier(.25,.46,.45,.94)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream2);color:var(--ink);font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}
#app{display:none}
#loading-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .4s ease}
#loading-screen.hide{opacity:0;pointer-events:none}
.ls-logo{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--cream);text-align:center}
.ls-logo span{color:var(--gm)}
.ls-spin{width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--gm);border-radius:50%;animation:spin .7s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOPBAR */
.topbar{height:60px;background:var(--w);border-bottom:1px solid var(--cream3);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.logo{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink)}
.logo span{color:var(--green)}
.topbar-right{display:flex;align-items:center;gap:14px}
.topbar-progress{font-size:11px;font-weight:500;letter-spacing:.05em;color:var(--green);font-family:var(--mono)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:500}

/* SHELL */
.shell{max-width:1060px;margin:0 auto;padding:32px 24px 80px;display:grid;grid-template-columns:250px 1fr;gap:30px;align-items:start}

/* SIDEBAR */
.sidebar{position:sticky;top:88px;background:var(--w);border:1px solid var(--cream3);border-radius:var(--rlg);padding:20px}
.sidebar-pct{font-family:var(--serif);font-size:30px;font-weight:900;color:var(--ink);line-height:1}
.sidebar-pct-lbl{font-size:11px;color:var(--ink3);margin-top:2px;margin-bottom:12px}
.sidebar-bar-bg{height:4px;background:var(--cream3);border-radius:4px;overflow:hidden;margin-bottom:18px}
.sidebar-bar-fill{height:100%;background:var(--gm);border-radius:4px;transition:width .4s var(--ease)}
.module-nav{display:flex;flex-direction:column;gap:4px}
.module-nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rsm);cursor:pointer;transition:background .15s}
.module-nav-item:hover{background:var(--cream2)}
.module-nav-item.active{background:var(--gl)}
.module-nav-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;background:var(--cream3);color:var(--ink3)}
.module-nav-item.done .module-nav-dot{background:var(--green);color:#fff}
.module-nav-item.active .module-nav-dot{background:var(--green);color:#fff}
.module-nav-label{font-size:12.5px;font-weight:500;color:var(--ink2)}
.module-nav-item.active .module-nav-label{color:var(--ink);font-weight:700}
.module-nav-item.done .module-nav-label{color:var(--ink3)}

/* MAIN CONTENT */
.module-panel{display:none}
.module-panel.active{display:block;animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.module-eyebrow{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
.module-title{font-family:var(--serif);font-size:clamp(24px,4vw,34px);font-weight:900;letter-spacing:-.5px;line-height:1.12;color:var(--ink);margin-bottom:14px}
.module-title em{font-style:italic;color:var(--green)}
.module-sub{font-size:14px;font-weight:300;color:var(--ink3);max-width:560px;line-height:1.8;margin-bottom:28px}

.lesson-card{background:var(--w);border:1px solid var(--cream3);border-radius:var(--rlg);padding:24px 26px;margin-bottom:14px}
.lesson-num{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.lesson-title{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--ink);margin-bottom:10px}
.lesson-body{font-size:13px;font-weight:300;color:var(--ink2);line-height:1.85}
.lesson-body strong{font-weight:600;color:var(--ink)}
.lesson-body ul{margin:10px 0 4px;padding-left:0;list-style:none}
.lesson-body li{position:relative;padding-left:18px;margin-bottom:8px}
.lesson-body li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--gm)}

.example-box{background:var(--gl);border:1px solid rgba(42,158,106,.25);border-radius:var(--rsm);padding:14px 16px;margin-top:12px}
.example-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.example-text{font-size:13px;color:var(--ink);line-height:1.7;font-style:italic}

.dont-box{background:var(--al);border:1px solid rgba(200,130,26,.25);border-radius:var(--rsm);padding:14px 16px;margin-top:10px}
.dont-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.dont-text{font-size:13px;color:var(--ink2);line-height:1.7}

.quiz-card{background:var(--w);border:1px solid var(--cream3);border-radius:var(--rlg);padding:24px 26px;margin-bottom:14px}
.quiz-q{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:14px;line-height:1.5}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--cream3);border-radius:var(--rsm);margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--ink2)}
.quiz-opt:hover{border-color:var(--gm);background:var(--gl)}
.quiz-opt.selected{border-color:var(--gm);background:var(--gl);color:var(--ink);font-weight:500}
.quiz-opt.correct{border-color:var(--gm);background:var(--gl)}
.quiz-opt.incorrect{border-color:var(--amber);background:var(--al)}
.quiz-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--cream3);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.quiz-opt.selected .quiz-radio{border-color:var(--gm)}
.quiz-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--gm);display:none}
.quiz-opt.selected .quiz-radio-dot{display:block}
.quiz-feedback{font-size:12px;margin-top:10px;padding:10px 12px;border-radius:var(--rsm);display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:var(--gl);color:var(--green)}
.quiz-feedback.incorrect{background:var(--al);color:var(--amber)}

.module-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.btn-prev{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);background:none;border:none;cursor:pointer;transition:color .15s}
.btn-prev:hover{color:var(--ink)}
.btn-prev:disabled{opacity:0;pointer-events:none}
.btn-next{font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--ink);border:none;padding:12px 28px;border-radius:var(--rsm);cursor:pointer;transition:all .2s}
.btn-next:hover{background:var(--ink2)}
.btn-next:disabled{background:var(--cream3);color:var(--ink3);cursor:not-allowed}

.cert-screen{text-align:center;padding:50px 24px}
.cert-badge{width:80px;height:80px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 8px 28px rgba(42,158,106,.25)}
.cert-title{font-family:var(--serif);font-size:30px;font-weight:900;color:var(--ink);margin-bottom:12px;letter-spacing:-.5px}
.cert-title em{font-style:italic;color:var(--green)}
.cert-sub{font-size:13px;color:var(--ink3);max-width:400px;margin:0 auto 28px;line-height:1.8}
.cert-pledge{background:var(--w);border:1px solid var(--cream3);border-radius:var(--rlg);padding:22px 24px;max-width:460px;margin:0 auto 24px;text-align:left}
.pledge-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:12px}
.pledge-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:11px;font-size:12.5px;color:var(--ink2);line-height:1.6}
.pledge-check{width:16px;height:16px;border-radius:50%;background:var(--gm);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}

@media(max-width:760px){.shell{grid-template-columns:1fr}.sidebar{position:static}}
</style>
</head>
<body>

<div id="loading-screen">
  <div>
    <div class="ls-logo">Lyfe<span>.</span>fy</div>
    <div class="ls-spin"></div>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <a href="dashboard.html" class="logo">Lyfe<span>.</span>fy</a>
    <div class="topbar-right">
      <span class="topbar-progress" id="topProgress">0% complete</span>
      <div class="avatar" id="topAv">?</div>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-pct" id="sidebarPct">0%</div>
      <div class="sidebar-pct-lbl">Host Academy progress</div>
      <div class="sidebar-bar-bg"><div class="sidebar-bar-fill" id="sidebarBar" style="width:0%"></div></div>
      <div class="module-nav" id="moduleNav"></div>
    </aside>
    <main id="moduleContent"></main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lyfe-core.js"></script>
<script>
let U=null,P=null;
let completedModules=[];
let currentModuleIndex=0;
let quizAnswered=false;
let quizCorrect=false;

function $(id){return document.getElementById(id);}

/* ══════════════════ CURRICULUM DATA ══════════════════ */
const MODULES=[
  {
    id:'welcome',label:'Welcome & Standards',eyebrow:'Module 1 of 5',
    title:'Welcome to the <em>Lyfe.fy Host Academy</em>',
    sub:'Before you host your first session, let\'s align on what makes a great Lyfe.fy experience — for you and for the players who book you.',
    content:`
      <div class="lesson-card">
        <div class="lesson-num">Why this matters</div>
        <div class="lesson-title">You're not just running a session — you're building a creator business</div>
        <div class="lesson-body">
          Every host on Lyfe.fy is part of a growing <strong>sports creator economy</strong>. Players choose Lyfe.fy because they trust that any session they book will be well-run, welcoming, and worth their time and money. Your rating, repeat bookings, and earnings all depend on the experience you create — not just your skill level.
          <div class="example-box">
            <div class="example-label">The Lyfe.fy Standard</div>
            <div class="example-text">"Every player should leave feeling like they got more than they paid for — better game, better company, better day."</div>
          </div>
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">Our 4 Host Principles</div>
        <div class="lesson-title">What every certified host commits to</div>
        <div class="lesson-body">
          <ul>
            <li><strong>Reliability</strong> — you show up on time, every time. A cancelled session damages trust in the whole platform, not just you.</li>
            <li><strong>Hospitality</strong> — you make every player feel welcome, regardless of skill level. Beginners and competitive players deserve the same warmth.</li>
            <li><strong>Honesty</strong> — your session listing accurately describes skill level, format, and what's included. No surprises on game day.</li>
            <li><strong>Growth mindset</strong> — you treat feedback and ratings as fuel to get better, not as something to take personally.</li>
          </ul>
        </div>
      </div>`
  },
  {
    id:'design',label:'Designing a Great Session',eyebrow:'Module 2 of 5',
    title:'Designing a session people <em>actually want</em>',
    sub:'The biggest driver of repeat bookings isn\'t your skill level — it\'s how clearly you set expectations before anyone shows up.',
    content:`
      <div class="lesson-card">
        <div class="lesson-num">The anatomy of a great listing</div>
        <div class="lesson-title">5 things every session needs</div>
        <div class="lesson-body">
          <ul>
            <li><strong>A specific title</strong> — "Saturday Morning Golf — Back Bay" beats "Golf Session." Specificity builds trust.</li>
            <li><strong>An honest skill level</strong> — be precise (e.g. "Handicap 8–18") rather than vague ("all levels") when the session truly suits a range.</li>
            <li><strong>A clear group size</strong> — small groups (3-4) build connection; large groups (8+) need more structure and communication from you.</li>
            <li><strong>Fair, transparent pricing</strong> — price for the value you provide, not just the time. Coached or structured sessions can command more than casual social play.</li>
            <li><strong>What to expect</strong> — use the description field. Mention what to bring, what's included, and the vibe (competitive vs. casual).</li>
          </ul>
          <div class="example-box">
            <div class="example-label">Good Example</div>
            <div class="example-text">"Sunday Beginner Golf — All Levels Welcome. Relaxed 9-hole round at a public course, perfect if you're newer to the game or just want a low-pressure morning. I'll bring extra balls and tees. Bring your own clubs if you have them — rentals available at the course for $15."</div>
          </div>
          <div class="dont-box">
            <div class="dont-label">Avoid</div>
            <div class="dont-text">"Golf session, come play." — No location detail, no skill level, no idea what to expect. Players will hesitate to book, and the ones who do may be a poor fit.</div>
          </div>
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">Pricing with confidence</div>
        <div class="lesson-title">How to price your session fairly</div>
        <div class="lesson-body">
          Free or low-cost sessions are a great way to build your rating and get your first reviews. Once you have 5+ reviews above 4.7 stars, you can confidently raise prices for coached or structured experiences. Lyfe.fy takes a 30% platform fee on paid bookings (you keep 70%) — factor that into your pricing.
        </div>
      </div>`
  },
  {
    id:'hospitality',label:'Communication & Hospitality',eyebrow:'Module 3 of 5',
    title:'The <em>first five minutes</em> matter most',
    sub:'How you greet players sets the tone for the entire session — and for whether they book with you again.',
    content:`
      <div class="lesson-card">
        <div class="lesson-num">Before the session</div>
        <div class="lesson-title">Set expectations early</div>
        <div class="lesson-body">
          <ul>
            <li>Confirm meeting details 24 hours ahead if possible — exact location, what to bring, parking notes.</li>
            <li>If weather could affect the session, communicate your rescheduling policy upfront.</li>
            <li>Arrive 5-10 minutes early. Being the first one there immediately signals reliability.</li>
          </ul>
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">During the session</div>
        <div class="lesson-title">Read the room</div>
        <div class="lesson-body">
          Not every group wants the same energy. A beginner-friendly session needs patience and encouragement. A competitive session can have higher intensity. Pay attention to player cues — if someone seems uncomfortable or left out, bring them into the conversation.
          <div class="example-box">
            <div class="example-label">Try saying</div>
            <div class="example-text">"Don't worry about your score today — we're just here to enjoy the course and figure out everyone's game." (for beginner sessions)</div>
          </div>
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">Handling no-shows and cancellations</div>
        <div class="lesson-title">Stay professional, always</div>
        <div class="lesson-body">
          If a player no-shows, don't take it personally and don't let it sour the session for everyone else. If you need to cancel, do it as early as possible and be transparent about why — players are far more forgiving of an honest, early cancellation than a late one.
        </div>
      </div>`
  },
  {
    id:'safety',label:'Safety & Professionalism',eyebrow:'Module 4 of 5',
    title:'Protecting yourself <em>and</em> your players',
    sub:'A few simple habits keep every session safe, fair, and free of avoidable disputes.',
    content:`
      <div class="lesson-card">
        <div class="lesson-num">Know your venue</div>
        <div class="lesson-title">Confirm access before you list a session</div>
        <div class="lesson-body">
          <ul>
            <li>Make sure you have legitimate access to any course, court, or facility you list — public access, membership, or a booked reservation.</li>
            <li>Check the venue's own rules on group size and guest policies before listing a session there.</li>
            <li>Have a backup plan for weather-dependent sports (rule of thumb: communicate 2+ hours before start time if cancelling for weather).</li>
          </ul>
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">Setting boundaries</div>
        <div class="lesson-title">You're a host, not an on-call coach</div>
        <div class="lesson-body">
          It's completely fine to keep your role scoped to what you advertised. If a player wants extended 1-on-1 coaching beyond the session, that's a separate conversation and separate booking — don't feel obligated to over-deliver for free.
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">Reporting issues</div>
        <div class="lesson-title">If something goes wrong</div>
        <div class="lesson-body">
          Disrespectful or unsafe player behavior should be reported to Lyfe.fy support immediately. We take host safety as seriously as player safety — you're never expected to tolerate harassment or unsafe conduct to keep a good rating.
        </div>
      </div>`
  },
  {
    id:'growth',label:'Growing as a Host',eyebrow:'Module 5 of 5',
    title:'Building a <em>real</em> hosting business',
    sub:'The best hosts on Lyfe.fy treat this like a craft — here\'s how the cycle of the creator economy works in your favor.',
    content:`
      <div class="lesson-card">
        <div class="lesson-num">The reputation flywheel</div>
        <div class="lesson-title">How ratings compound</div>
        <div class="lesson-body">
          Every 5-star session makes your next booking easier. Players actively search and filter by rating — hosts above 4.8 stars consistently get priority visibility in search and fill spots faster. Treat every single session, even free ones early on, as a rating-building opportunity.
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">Turning players into regulars</div>
        <div class="lesson-title">Repeat bookings are the real business</div>
        <div class="lesson-body">
          <ul>
            <li>Remember names and small details — it costs nothing and builds loyalty fast.</li>
            <li>After a great session, it's perfectly fine to mention you host weekly or biweekly — let players opt in naturally.</li>
            <li>Stay linked with players you've hosted — future session announcements reach people who already trust you.</li>
          </ul>
        </div>
      </div>
      <div class="lesson-card">
        <div class="lesson-num">What's next</div>
        <div class="lesson-title">Beyond your first sessions</div>
        <div class="lesson-body">
          Completing this Academy gets you full Host access. As you build a track record (10+ sessions, 4.8+ rating), you'll be eligible for premium placement, higher pricing tiers, and brand partnership opportunities on Lyfe.fy.
        </div>
      </div>`
  }
];

const QUIZ={
  question:"A player messages you 3 hours before your session saying it might rain. What's the best response?",
  options:[
    {text:"Cancel immediately to be safe, regardless of the actual forecast.",correct:false,feedback:"Cancelling without checking the real forecast erodes trust unnecessarily — players value hosts who communicate clearly, not hosts who panic."},
    {text:"Check the actual forecast, communicate your decision clearly with a backup plan if there's any uncertainty, and update players with enough notice.",correct:true,feedback:"Exactly right — clear, timely communication with a real plan is what separates trusted hosts from unreliable ones."},
    {text:"Wait and see, don't respond until game time.",correct:false,feedback:"Going silent before a session is one of the fastest ways to damage your rating, even if the session ends up happening fine."}
  ]
};

const PLEDGE_ITEMS=[
  "I will accurately represent skill level, format, and pricing in every session I list.",
  "I will arrive on time and communicate proactively if my plans change.",
  "I will treat every player — regardless of skill level — with patience and respect.",
  "I understand my rating reflects the experience I create, and I will use feedback to improve."
];

/* ══════════════════ RENDER ══════════════════ */
function renderSidebar(){
  const nav=$('moduleNav');
  nav.innerHTML=MODULES.map((m,i)=>{
    const done=completedModules.includes(m.id);
    const active=i===currentModuleIndex;
    return`<div class="module-nav-item ${done?'done':''} ${active?'active':''}" onclick="goToModule(${i})">
      <div class="module-nav-dot">${done?'✓':i+1}</div>
      <div class="module-nav-label">${m.label}</div>
    </div>`;
  }).join('')+`<div class="module-nav-item ${completedModules.length===MODULES.length?'active':''}" onclick="goToFinal()" style="${completedModules.length<MODULES.length?'opacity:.4;pointer-events:none':''}">
      <div class="module-nav-dot">🎓</div>
      <div class="module-nav-label">Final Pledge</div>
    </div>`;

  const pct=Math.round((completedModules.length/MODULES.length)*100);
  $('sidebarPct').textContent=pct+'%';
  $('sidebarBar').style.width=pct+'%';
  $('topProgress').textContent=pct+'% complete';
}

function renderModule(index){
  currentModuleIndex=index;
  const m=MODULES[index];
  const isLast=index===MODULES.length-1;

  let html=`
    <div class="module-eyebrow">${m.eyebrow}</div>
    <h1 class="module-title">${m.title}</h1>
    <p class="module-sub">${m.sub}</p>
    ${m.content}`;

  if(isLast){
    html+=`
      <div class="quiz-card">
        <div class="lesson-num">Quick Check</div>
        <div class="quiz-q">${QUIZ.question}</div>
        <div id="quizOptions">
          ${QUIZ.options.map((o,i)=>`
            <div class="quiz-opt" id="qopt-${i}" onclick="selectQuiz(${i})">
              <div class="quiz-radio"><div class="quiz-radio-dot"></div></div>
              <span>${o.text}</span>
            </div>`).join('')}
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>
      </div>`;
  }

  html+=`
    <div class="module-actions">
      <button class="btn-prev" onclick="prevModule()" ${index===0?'disabled':''}>← Previous</button>
      <button class="btn-next" id="nextBtn" onclick="completeModule('${m.id}', ${index})" ${isLast&&!quizCorrect?'disabled':''}>
        ${isLast?'Complete Final Module →':'Mark Complete & Continue →'}
      </button>
    </div>`;

  $('moduleContent').innerHTML=html;
  renderSidebar();
}

function selectQuiz(i){
  document.querySelectorAll('.quiz-opt').forEach(el=>el.classList.remove('selected','correct','incorrect'));
  const opt=QUIZ.options[i];
  const el=$('qopt-'+i);
  el.classList.add('selected');
  quizAnswered=true;
  quizCorrect=opt.correct;
  el.classList.add(opt.correct?'correct':'incorrect');
  const fb=$('quizFeedback');
  fb.textContent=opt.feedback;
  fb.className='quiz-feedback show '+(opt.correct?'correct':'incorrect');
  $('nextBtn').disabled=!opt.correct;
}

function goToModule(i){
  if(i<=currentModuleIndex||completedModules.includes(MODULES[i].id)||i===0){
    renderModule(i);
  }else if(completedModules.length>=i){
    renderModule(i);
  }
}

function prevModule(){
  if(currentModuleIndex>0)renderModule(currentModuleIndex-1);
}

async function completeModule(id,index){
  if(!completedModules.includes(id)){
    completedModules.push(id);
    await db.from('profiles').update({training_progress:completedModules}).eq('id',U.id);
  }
  if(index<MODULES.length-1){
    renderModule(index+1);
  }else{
    goToFinal();
  }
}

function renderFinal(){
  currentModuleIndex=MODULES.length;
  const html=`
    <div class="cert-screen">
      <div class="cert-badge">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 class="cert-title">You're ready to <em>host</em></h1>
      <p class="cert-sub">You've completed all 5 modules of the Lyfe.fy Host Academy. One last step — take the Host Pledge to unlock your full host dashboard.</p>
      <div class="cert-pledge">
        <div class="pledge-title">The Host Pledge</div>
        ${PLEDGE_ITEMS.map(text=>`
          <div class="pledge-item">
            <div class="pledge-check"><svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="2,5 4,7.5 8,2.5"/></svg></div>
            <span>${text}</span>
          </div>`).join('')}
      </div>
      <button class="btn-next" style="padding:14px 36px;font-size:13px" onclick="finishAcademy()">I Agree — Activate My Host Account</button>
    </div>`;
  $('moduleContent').innerHTML=html;
  renderSidebar();
}

function goToFinal(){
  if(completedModules.length===MODULES.length)renderFinal();
}

async function finishAcademy(){
  const btn=document.querySelector('.cert-screen .btn-next');
  btn.textContent='Activating…';btn.disabled=true;
  await db.from('profiles').update({
    role:'host',
    training_progress:completedModules,
    training_completed_at:new Date().toISOString(),
    training_quiz_score:quizCorrect?100:0
  }).eq('id',U.id);
  window.location.href='dashboard.html?academy=complete';
}

/* ══════════════════ BOOT (Supabase auth, matches dashboard.html) ══════════════════ */
(async function boot(){
  let loaded=false;
  const timeout=setTimeout(()=>{if(!loaded)window.location.href='onboarding.html';},4000);
  db.auth.onAuthStateChange(async(event,session)=>{
    if(session&&!loaded){loaded=true;clearTimeout(timeout);await init(session);}
    else if(event==='SIGNED_OUT'){clearTimeout(timeout);window.location.href='onboarding.html';}
  });
  const{data:{session:s}}=await db.auth.getSession();
  if(s&&!loaded){loaded=true;clearTimeout(timeout);await init(s);}
})();

async function init(session){
  U=session.user;
  const{data:profile}=await db.from('profiles').select('*').eq('id',U.id).single();
  P=profile;
  const role=P?.role||'member';

  // Guard: only host_training users belong here
  if(role==='host'||role==='certified'){
    window.location.href='dashboard.html';
    return;
  }
  if(role!=='host_training'){
    window.location.href='dashboard.html';
    return;
  }

  // Avatar
  const name=P?.full_name||U?.user_metadata?.full_name||U?.email?.split('@')[0]||'?';
  $('topAv').textContent=name[0].toUpperCase();

  completedModules=Array.isArray(P.training_progress)?P.training_progress:[];

  let startIndex=MODULES.findIndex(m=>!completedModules.includes(m.id));
  if(startIndex===-1){
    renderFinal();
  }else{
    renderModule(startIndex);
  }

  $('loading-screen').classList.add('hide');
  setTimeout(()=>{const ls=$('loading-screen');if(ls)ls.style.display='none';},400);
  $('app').style.display='block';
}
</script>
</body>
</html>
